; EMS Timer — PlatformIO 設定
; Phase 1: 按鈕 + OLED + 蜂鳴器 + 麥克風（ESP32-S3）
; Phase 2 (2A~2E+3A): 5 鍵狀態機 + LittleFS 持久儲存
; 測試：pio test -e native（純邏輯單元測試，不需硬體）

[platformio]
; 預設 build target（`pio run` 不指定 env 時用）
default_envs = esp32-s3-devkitc-1

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Serial monitor 速率
monitor_speed = 115200

; ESP32-S3 native USB：讓 Serial 走 USB CDC（usbmodem port）
build_flags = -DARDUINO_USB_CDC_ON_BOOT=1

; 函式庫依賴（LittleFS 為 ESP32 Arduino core 內建，不需另外加）
lib_deps =
    adafruit/Adafruit SSD1306 @ ^2.5.9
    adafruit/Adafruit GFX Library @ ^1.11.9
    bblanchon/ArduinoJson @ ^7.0.0

; ============================================================
; Native 測試環境：跑 lib/ems_logic 的純邏輯單元測試
; 執行：pio test -e native
; ============================================================
[env:native]
platform = native
test_framework = unity

; 不把 src/ 編進 native build（main.cpp 依賴 Arduino.h 不可用）
build_src_filter = -<*>

; 只編 test 和 lib
build_flags =
    -std=gnu++17
    -DUNIT_TEST
